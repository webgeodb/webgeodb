<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空间谓词可视化 - WebGeoDB 教程</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>🗺️ 空间谓词可视化演示</h1>
            <p class="subtitle">WebGeoDB 教程第2章 - 8个OGC标准空间谓词</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="predicate-selector">
                    <h3>选择空间谓词</h3>
                    <div class="predicate-list">
                        <button class="predicate-btn active" data-predicate="intersects">
                            <span class="icon">🔷</span>
                            <span class="name">Intersects</span>
                            <span class="description">相交</span>
                        </button>
                        <button class="predicate-btn" data-predicate="contains">
                            <span class="icon">📦</span>
                            <span class="name">Contains</span>
                            <span class="description">包含</span>
                        </button>
                        <button class="predicate-btn" data-predicate="within">
                            <span class="icon">📍</span>
                            <span class="name">Within</span>
                            <span class="description">在内部</span>
                        </button>
                        <button class="predicate-btn" data-predicate="touches">
                            <span class="icon">👆</span>
                            <span class="name">Touches</span>
                            <span class="description">相接</span>
                        </button>
                        <button class="predicate-btn" data-predicate="crosses">
                            <span class="icon">✖️</span>
                            <span class="name">Crosses</span>
                            <span class="description">交叉</span>
                        </button>
                        <button class="predicate-btn" data-predicate="overlaps">
                            <span class="icon">🔲</span>
                            <span class="name">Overlaps</span>
                            <span class="description">重叠</span>
                        </button>
                        <button class="predicate-btn" data-predicate="disjoint">
                            <span class="icon">➖</span>
                            <span class="name">Disjoint</span>
                            <span class="description">分离</span>
                        </button>
                        <button class="predicate-btn" data-predicate="equals">
                            <span class="icon">⚖️</span>
                            <span class="name">Equals</span>
                            <span class="description">相等</span>
                        </button>
                    </div>
                </div>

                <div class="info-panel">
                    <h3>当前谓词</h3>
                    <div id="predicate-info">
                        <h4 id="predicate-name">Intersects (相交)</h4>
                        <p id="predicate-description">判断两个几何体是否相交</p>
                        <div class="result-box">
                            <span class="result-label">查询结果：</span>
                            <span id="query-result" class="result-value">true</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="map-section">
                <div class="map-controls">
                    <button class="control-btn" id="reset-btn" title="重置地图">
                        <span>🔄</span> 重置
                    </button>
                    <button class="control-btn" id="random-btn" title="随机生成">
                        <span>🎲</span> 随机
                    </button>
                    <button class="control-btn" id="animate-btn" title="动画演示">
                        <span>▶️</span> 动画
                    </button>
                </div>
                <div id="map"></div>
                <div class="map-legend">
                    <div class="legend-item">
                        <span class="legend-color" style="background: #4285f4;"></span>
                        <span>对象A</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #ea4335;"></span>
                        <span>对象B</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: rgba(66, 133, 244, 0.2); border: 2px solid #4285f4;"></span>
                        <span>相交区域</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div class="tutorial-links">
                <a href="https://github.com/zhyt1985/webgeodb" target="_blank">
                    📚 WebGeoDB 文档
                </a>
                <a href="../" target="_blank">
                    🔙 返回教程
                </a>
            </div>
            <p class="copyright">
                © 2025 WebGeoDB - 交互式空间数据库教程
            </p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
